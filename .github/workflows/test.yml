name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb at-spi2-core libgirepository1.0-dev libcairo2-dev

      - name: Install Python dependencies
        run: |
          pip install -e ".[test]"

      - name: Run unit tests
        run: pytest tests/services/ tests/core/ -v

      - name: Run GTK tests
        run: xvfb-run -a pytest tests/ui/gtk/ -v --timeout=30

      - name: Run E2E tests
        run: xvfb-run -a pytest tests/e2e/ -v --timeout=60

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
