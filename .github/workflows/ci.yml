name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-4.0 gir1.2-gtksource-5
    
    - name: Install Python dependencies
      run: |
        pip install -e ".[dev]"
    
    - name: Run ruff check
      run: ruff check slate/ tests/
    
    - name: Run mypy
      run: mypy slate/
    
    - name: Run tests with coverage
      run: pytest tests/ --cov=slate --cov-report=term-missing --cov-fail-under=85
